<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فساتين باللون الأحمر</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cairo',sans-serif;
background:#fff;
color:#111;
}

/* ===== HEADER ===== */
header{
position:fixed;
top:0;
right:0;
width:100%;
height:90px;
background:rgba(255,255,255,0.96);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
z-index:999;
border-bottom:1px solid #eee;
}

.menu-icon{
font-size:30px;
cursor:pointer;
}

.logo{
position:absolute;
left:50%;
transform:translateX(-50%);
text-align:center;
}

.logo .ar{
font-size:34px;
font-weight:bold;
font-family:'Playfair Display',serif;
}

.logo .en{
font-size:16px;
letter-spacing:3px;
font-family:'Playfair Display',serif;
}

/* ===== MENU ===== */
.menu{
position:fixed;
top:90px;
right:-100%;
width:260px;
height:100vh;
background:#fff;
padding:25px;
transition:0.4s;
box-shadow:-10px 0 20px rgba(0,0,0,0.08);
}

.menu.show{
right:0;
}

.menu a{
display:block;
padding:15px 0;
text-decoration:none;
color:#111;
border-bottom:1px solid #eee;
}

/* ===== PAGE HEADER ===== */
.page-header{
margin-top:90px;
padding:60px 10%;
background:#111;
color:#fff;
}

.page-header h1{
font-size:40px;
margin-bottom:10px;
font-family:'Playfair Display',serif;
}

.breadcrumb{
font-size:16px;
color:#ccc;
}

/* ===== PRODUCTS ===== */
.products{
padding:60px 10%;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
border:1px solid #eee;
transition:0.3s;
background:#fff;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 15px 25px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:340px;
object-fit:cover;
}

.card-content{
padding:15px;
text-align:center;
}

.price{
font-weight:bold;
margin:8px 0;
}

/* ===== FOOTER ===== */
footer{
text-align:center;
padding:25px;
border-top:1px solid #eee;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

.page-header h1{
font-size:28px;
}

}

</style>
</head>

<body>

<!-- HEADER -->
<header>
<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="logo">
<div class="ar">بوتيك ميم</div>
<div class="en">BOUTIQUE MEM</div>
</div>
</header>

<!-- MENU -->
<div class="menu" id="menu">
<a href="index.html">الرئيسية</a>
<a href="index.html#sizes">الألوان</a>
<a href="index.html#products">الفساتين</a>
<a href="#">تواصل</a>
</div>

<!-- PAGE HEADER -->
<div class="page-header">
<h1>فساتين باللون الازرق</h1>
<div class="breadcrumb">الرئيسية > فساتين باللون الازرق</div>
</div>

<!-- PRODUCTS -->
<section class="products">

<div class="grid">

<!-- منتج 1 -->
<div class="card">
<img src="Blue/1.jpeg">
<div class="card-content">
<h3>فستان ازرق أنيق</h3>
<p>تصميم فاخر لمناسباتك</p>
</div>
</div>

<!-- منتج 2 -->
<div class="card">
<img src="Blue/2.jpeg">
<div class="card-content">
<h3>فستان سهرة ازرق</h3>
<p>إطلالة جذابة وفخمة</p>
</div>
</div>

<!-- منتج 3 -->
<div class="card">
<img src="Blue/3.jpeg">
<div class="card-content">
<h3>فستان كلاسيك ازرق</h3>
<p>ستايل ناعم وأنيق</p>
</div>
</div>


<!-- منتج 4 -->
<div class="card">
<img src="Blue/4.jpeg">
<div class="card-content">
<h3>فستان ازرق أنيق</h3>
<p>تصميم فاخر لمناسباتك</p>
</div>
</div>



</div>

</section>

<!-- FOOTER -->
<footer>
© 2026 Boutique Mim
</footer>

<script>
function toggleMenu(){
document.getElementById("menu").classList.toggle("show");
}
</script>

</body>
</html>
