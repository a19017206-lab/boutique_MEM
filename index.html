<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boutique Mim</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:'Cairo',sans-serif;
background:#fff;
color:#111;
overflow-x:hidden;
}

/* ===== HEADER ===== */
header{
position:fixed;
top:0;
right:0;
width:100%;
height:90px;
background:rgba(255,255,255,0.96);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
z-index:999;
border-bottom:1px solid #eee;
}

.menu-icon{
font-size:30px;
cursor:pointer;
}

.logo{
position:absolute;
left:50%;
transform:translateX(-50%);
text-align:center;
line-height:1.1;
}

.logo .ar{
font-size:38px;
font-weight:700;
font-family:'Playfair Display',serif;
}

.logo .en{
font-size:19px;
letter-spacing:4px;
font-family:'Playfair Display',serif;
}

/* ===== MENU ===== */
.menu{
position:fixed;
top:90px;
right:-100%;
width:260px;
height:100vh;
background:#fff;
box-shadow:-10px 0 20px rgba(0,0,0,0.08);
padding:25px;
transition:0.4s;
z-index:998;
}

.menu.show{
right:0;
}

.menu a{
display:block;
padding:15px 0;
text-decoration:none;
color:#111;
border-bottom:1px solid #eee;
font-size:18px;
}

.top-banner{
margin-top:90px;
width:100%;
max-width:1400px;
height:400px; /* حجم متوازن */
margin-right:auto;
margin-left:auto;
overflow:hidden;
border-radius:10px;
}

.top-banner img{
width:100%;
height:100%;
object-fit:cover;

/* هذا أهم سطر 👇 */
object-position: center top;
}
.top-banner img{
width:100%;
height:auto; /* مهم */
object-fit:contain; /* يمنع القص */
display:block;
margin:auto;
}
@media(max-width:768px){

.top-banner{
height:250px;
}

}
/* ===== HERO ===== */
.hero{
height:100vh;
background:url('mmm.jpg') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.35);
}

.hero-content{
position:relative;
z-index:2;
color:#fff;
max-width:700px;
padding:20px;
}

.hero-content h1{
font-size:50px;
font-family:'Playfair Display',serif;
margin-bottom:15px;
}

.hero-content p{
font-size:20px;
margin-bottom:25px;
}

.btn{
padding:14px 34px;
background:#fff;
color:#111;
border:none;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

.btn:hover{
background:#111;
color:#fff;
}

/* ===== SIZES ===== */
.sizes{
padding:80px 10%;
background:#fafafa;
}

.sizes-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.size-card{
position:relative;
cursor:pointer;
overflow:hidden;
border-radius:6px;
}

.size-card img{
width:100%;
height:280px;
object-fit:cover;
transition:0.4s;
}

.size-card:hover img{
transform:scale(1.05);
}

.size-label{
position:absolute;
bottom:0;
width:100%;
background:#fff;
text-align:center;
padding:12px;
font-size:20px;
font-weight:bold;
}

/* ===== PRODUCTS ===== */
section{
padding:80px 10%;
}

.title{
font-size:34px;
margin-bottom:30px;
text-align:center;
font-family:'Playfair Display',serif;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.card{
border:1px solid #eee;
background:#fff;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 15px 30px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:360px;
object-fit:cover;
}

.card-content{
padding:18px;
text-align:center;
}

.price{
font-weight:bold;
margin:10px 0;
}

/* ===== FLOAT ===== */
.float{
position:fixed;
bottom:20px;
right:15px;
display:flex;
flex-direction:column;
gap:10px;
z-index:999;
}

.float a{
width:52px;
height:52px;
border-radius:50%;
background:#111;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
font-size:22px;
}

/* ===== FOOTER ===== */
footer{
text-align:center;
padding:30px;
border-top:1px solid #eee;
margin-top:40px;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

.logo .ar{
font-size:30px;
}

.logo .en{
font-size:15px;
}

.hero-content h1{
font-size:35px;
}

.hero-content p{
font-size:17px;
}

header{
padding:0 15px;
}

.top-banner{
height:auto;
}

}

</style>
</head>

<body>

<!-- HEADER -->
<header>
<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="logo">
<div class="ar">بوتيك ميم</div>
<div class="en">BOUTIQUE MEM</div>
</div>
</header>

<!-- MENU -->
<div class="menu" id="menu">
<a href="#">الرئيسية</a>
<a href="#products">الفساتين</a>
<a href="#">تواصل</a>
</div>

<!-- BANNER -->
<div class="top-banner">
<img src="mmm.jpeg">
</div>


<!-- SIZES -->
<section class="sizes" id="sizes">
<h2 class="title">تسوقي حسب اللون</h2>

<div class="sizes-grid">

<a href="R.html" class="size-card">
<img src="red.jpeg">
<div class="size-label"> Red</div>
</a>

<a href="B.html" class="size-card">
<img src="bluo.jpeg">
<div class="size-label">Blue </div>
</a>

<a href="P.html" class="size-card">
<img src="pink.jpeg">
<div class="size-label"> Pink</div>
</a>

<a href="k.html" class="size-card">
<img src="black.jpeg">
<div class="size-label"> Black</div>
</a>

</div>
</section>

<!-- PRODUCTS -->
<section id="products">
<h2 class="title">وصل حديثًا</h2>

<div class="grid">

<div class="card">
<img src="NWE.jpeg">
<div class="card-content">
<h3>فستان سهرة فاخر</h3>
<p>تصميم أنيق لمناسباتك الخاصة</p>
</div>
</div>

<div class="card">
<img src="NWE2.jpeg">
<div class="card-content">
<h3>فستان ملكي</h3>
<p>خامة فاخرة وتفاصيل راقية</p>
</div>
</div>

</div>
</section>

<!-- FLOAT -->
<div class="float">
<a href="https://wa.me/9627XXXXXXXX">💬</a>
<a href="tel:+9627XXXXXXXX">📞</a>
</div>

<!-- FOOTER -->
<footer>
© 2026 Boutique Mim
</footer>

<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("show");
}

function goProducts(){
document.getElementById("products").scrollIntoView({
behavior:"smooth"
});
}

</script>

</body>
</html>
